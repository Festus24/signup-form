<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signin</title>
</head>
<body>
    <input type="text" placeholder="email" id="email">
    <input type="password" placeholder="password" id="password">
    <button onclick="submit()" id="btnText">signin</button>
</body>
<script>
    let allUsers = JSON.parse(localStorage.getItem('users'))

    const submit = () => {
    emailValue = document.getElementById('email').value
    passwordValue = document.getElementById('password').value
    userObj = {emailValue, passwordValue}

    const found = allUsers.find(users => users.emailValue === userObj.emailValue)
    if(found){
        allUsers.push(localStorage.getItem('users',JSON.stringify(allUsers)))
        setTimeout(() =>{
            window.location.href = 'dashboard.html'
        }, 1500);
    }
    else{
        window.location.href = 'index.html'
    }
    }


</script>
</html>
